<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plants vs Zombies - Soundtrack Completo</title>
    <style>
        body { background-color: #2e7d32; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .contenedor { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px; width: 380px; margin: auto; border: 4px solid #55a630; box-shadow: 0px 0px 20px #000; }
        select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; cursor: pointer; background: #f0f0f0; }
        h1 { text-shadow: 3px 3px #000; color: #a2d2ff; margin-bottom: 10px; }
        p { font-size: 0.9em; color: #ccc; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Música del Juego</h1>
    <p>Selecciona una pista para comenzar la batalla</p>

    <div class="contenedor">
        <!-- Menú con las 10 canciones completas -->
        <select id="selectorMusica" onchange="cambiarCancion()">
            <option value="">-- Selecciona una canción --</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/20.%20Grasswalk%20%28In%20Game%29.mp3">1. Grasswalk (Día)</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/22.%20Moongrains%20%28In%20Game%29.mp3">2. Moongrains (Noche)</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/24.%20Watery%20Graves%20%28In%20Game%29.mp3">3. Watery Graves (Piscina)</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/26.%20Rigor%20Mormist%20%28In%20Game%29.mp3">4. Rigor Mormist (Niebla)</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/28.%20Graze%20The%20Roof%20%28In%20Game%29.mp3">5. Graze The Roof (Tejado)</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/25.%20Ultimate%20Battle%20%28In%20Game%29.mp3">6. Ultimate Battle</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/29.%20Brainiac%20Maniac%20%28In%20Game%29.mp3">7. Brainiac Maniac (Boss)</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/27.%20Cerebrawl%20%28In%20Game%29.mp3">8. Cerebrawl (Minijuegos)</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/21.%20Loonboon%20%28In%20Game%29.mp3">9. Loonboon</option>
            <option value="https://archive.org/download/20.-grasswalk-in-game/18.%20Crazy%20Dave%20%28In%20Game%29.mp3">10. Crazy Dave Theme</option>
        </select>

        <br>

        <audio id="reproductor" controls>
            <source id="fuente" src="" type="audio/mpeg">
            Tu navegador no soporta el audio.
        </audio>
    </div>

    <script>
        var reproductor = document.getElementById("reproductor");
        var selector = document.getElementById("selectorMusica");

        function cambiarCancion() {
            var url = selector.value;
            if (url === "") return; 

            var fuente = document.getElementById("fuente");
            
            reproductor.pause();
            fuente.src = url;
            reproductor.load(); 
            
            // Reproducir automáticamente al cambiar
            var playPromise = reproductor.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Haz clic en el play para iniciar.");
                });
            }
        }

        // Sistema para que las 10 canciones se sigan una tras otra
        reproductor.onended = function() {
            var proximo = selector.selectedIndex + 1;
            // Si llega al final de las 10, vuelve a la primera
            if (proximo >= selector.options.length) {
                proximo = 1; 
            }
            selector.selectedIndex = proximo;
            cambiarCancion()
        };
    </script>
</body>
</html>
